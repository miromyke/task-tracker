services:
  app:
    build: .
    image: reno-planner
    environment:
      # Bootstrap admin. The only account defined outside the app; all other
      # members are created in-app. APP_ADMIN_PASSWORD is (re)applied on boot,
      # so it doubles as the lockout-recovery path.
      APP_ADMIN_USER: ${APP_ADMIN_USER:-mykhailo}
      APP_ADMIN_NAME: ${APP_ADMIN_NAME:-Mykhailo}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:?set APP_ADMIN_PASSWORD in .env}
      # Secret used to sign session cookies. CHANGE THIS in production.
      APP_SECRET: ${APP_SECRET:-please-change-this-secret}
      # Timezone used to group activity into calendar days.
      APP_TZ: ${APP_TZ:-UTC}
    volumes:
      - reno_data:/data
    restart: unless-stopped
    # Not published to the host — only Caddy reaches it over the internal network.
    expose:
      - "8080"

  # Production sandbox: same image, separate DB volume and session secret, served
  # on sandbox.${DOMAIN}. Lets you test against prod without touching real data.
  app-sandbox:
    build: .
    image: reno-planner
    environment:
      APP_ADMIN_USER: ${APP_ADMIN_USER:-mykhailo}
      APP_ADMIN_NAME: ${APP_ADMIN_NAME:-Mykhailo}
      # Defaults to the prod admin password, but keep its data/secret separate.
      APP_ADMIN_PASSWORD: ${SANDBOX_ADMIN_PASSWORD:-${APP_ADMIN_PASSWORD:?set APP_ADMIN_PASSWORD in .env}}
      APP_SECRET: ${SANDBOX_SECRET:-please-change-this-sandbox-secret}
      APP_TZ: ${APP_TZ:-UTC}
      # Drives the corner badge in the UI so you always know it's the sandbox.
      APP_ENV: sandbox
    volumes:
      - reno_data_sandbox:/data
    restart: unless-stopped
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Domain the app is served on (A record must point at this VM).
      DOMAIN: ${DOMAIN}
      # Email Let's Encrypt uses for expiry notices.
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  reno_data:
  reno_data_sandbox:
  caddy_data:
  caddy_config:
